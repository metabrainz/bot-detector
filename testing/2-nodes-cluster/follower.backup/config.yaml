version: "1.0"

application:
  log_level: "info"
  config:
    polling_interval: "5s"

parser:
  out_of_order_tolerance: "0s"

websites:
  - name: "test"
    vhosts: ["example.com"]
    log_path: "/tmp/bot-detector-cluster-test.log"

checker:
  actor_cleanup_interval: "1m"
  actor_state_idle_timeout: "30m"

blockers:
  default_duration: "5m"
  backends:
    haproxy:
      addresses: []
      duration_tables:
        "5m": "table_5m"

cluster:
  nodes:
    - name: leader
      address: "127.0.0.1:8080"
    - name: follower
      address: "127.0.0.1:9090"
  config_poll_interval: "5s"
  protocol: http
  state_sync:
    enabled: true
    interval: "5s"
    compression: true
    timeout: "30s"
    incremental: true

chain_defaults:
  action: "block"
  match_key: "ip"
  on_match: "stop"

chains:
  - name: "Test-Block-429"
    block_duration: "5m"
    steps:
      - field_matches:
          statuscode: 429
        repeated: 3
