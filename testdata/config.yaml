version: "1.0"

application:
  log_level: "debug"
  config:
    polling_interval: "5s"

parser:
  line_ending: "lf"
  out_of_order_tolerance: "5s"

checker:
  unblock_on_good_actor: false
  unblock_cooldown: "5m"
  actor_cleanup_interval: "1m"
  actor_state_idle_timeout: "30m"

challenge:
  backends:
    - "127.0.0.1:6379"
  key_prefix: "test:challenge"
  default_duration: "1h"

blockers:
  default_duration: "30m"
  commands_per_second: 100
  command_queue_size: 10000
  max_commands_per_batch: 500
  dial_timeout: "5s"
  max_retries: 3
  retry_delay: "200ms"
  backends:
    haproxy:
      addresses:
        - "/var/run/haproxy/admin.sock"
      duration_tables:
        "30m": "thirty_min_blocks"
        "1h": "one_hour_blocks"

good_actors:
  - name: "our_network"
    ip: "file:good_actors_ips.txt"
  - name: "monitoring_agent"
    useragent: "regex:(?i)HealthCheck"
  - name: "known_bot"
    ip: "8.8.8.8"
    useragent: "regex:(?i)KnownBot"


chain_defaults:
  match_key: "ip"

chains:
  # --- 1. Simple Log Chain (10.0.0.1) ---
  - name: "SimpleLogChain"
    action: "log"
    steps:
      - field_matches: { path: "regex:^/log/step1" }
      - field_matches: { path: "regex:^/log/step2" }

  # --- 2. Simple Block Chain (10.0.0.2) ---
  - name: "SimpleBlockChain"
    action: "block"
    block_duration: "1h"
    steps:
      - field_matches: { path: "/block/step1" }
      - field_matches: { path: "/block/step2" }

  # --- 3. Out-of-Order Chain (10.0.0.3) ---
  - name: "OutOfOrderChain"
    action: "log"
    steps:
      - field_matches: { path: "regex:^/order/start$" }
      - field_matches: { path: "/order/end" }

  # --- 4. IPv6 User-Agent Change Detection (2001:db8::4) ---
  - name: "IPv6-UA-Change-Detection"
    action: "log"
    match_key: "ipv6" # Track by IPv6, steps will check UserAgent
    steps:
      - field_matches: # Using explicit regex for clarity
          path: "regex:^/ua/probe$" # This regex is simple, leave as is.
          useragent: |-
            regex:^Mozilla/5\.0 \(UA1\)$
      - field_matches: # Using exact match for path
          path: "/ua/attack"
          useragent: |-
            regex:^Mozilla/5\.0 \(UA2\)$
        max_delay: "5s" # Must occur within 5 seconds of the first step

  # --- 5. IP+UA with Common Referrer (10.0.0.5) - SUCCESS (LOG) ---
  # This chain uses match_key: ip_ua and tracks a sequence of 3 hits
  # with the same IP and User-Agent, and a common referrer.
  - name: "IP-UA-Referrer-Chain"
    action: "log" # Action is log
    steps:
      - field_matches:
          useragent: |-
            regex:^Consistent_UA_\d+\.\d+$
          referrer: "https://common.ref/page"
          statuscode: 200 # Integer match
      - field_matches:
          path: "/ua-ref/step2"
          useragent: |-
            regex:^Consistent_UA_\d+\.\d+$
          referrer: "https://common.ref/page"
          statuscode: "5XX" # Use new status code pattern
        max_delay: "10s"

  # --- 6. Sleepy Bot Detection (min_time_since_last_hit) ---
  - name: "SleepyBotChain"
    action: "log"
    steps:
      - min_time_since_last_hit: "15s"
        field_matches:
          path: "/sleepy/probe"

  # --- 7. Combined Field Matching (Size and IP) ---
  - name: "CombinedMatcherChain"
    action: "log"
    steps:
      - field_matches:
          size:
            gte: 5000
          ip: |-
            regex:^1\.2\.3\.

  # --- 8. Malformed Request Matching ---
  - name: "MalformedRequestChain"
    action: "log"
    steps:
      - field_matches:
          statuscode: 400
          method: ""
          size: -1

  # --- 9. HTTP/2 Protocol Matching ---
  - name: "HTTP2RequestChain"
    action: "log"
    steps:
      - field_matches:
          protocol: "HTTP/2.0"
          path: "file:http2_paths.txt"

  # --- 10. VHost Matching ---
  - name: "VHostSpecificChain"
    action: "log"
    steps:
      - field_matches:
          vhost: "internal.api.com"
          path: "/admin/dashboard"

  # --- 11. Chain Reset Test ---
  - name: "ChainResetTest"
    action: "log"
    steps:
      - field_matches: { path: "/reset/step1" }
      - max_delay: "5s"
        field_matches: { path: "/reset/step2" }

  # --- 12. Chain Order Test ---
  # This tests that a single log entry is processed against all chains in order.
  # The log entry for /chain-order-test will first match ChainOrderTest_Log,
  # which logs the action. Then, processing continues to the next chain,
  # ChainOrderTest_Block, which matches and blocks the IP.
  - name: "ChainOrderTest_Log"
    action: "log"
    steps:
      - field_matches: { path: "/chain-order-test" }
  - name: "ChainOrderTest_Block"
    action: "block"
    block_duration: "10m"
    steps:
      - field_matches: { path: "/chain-order-test" }

  # --- 13. OnMatch Stop Test ---
  # This tests that `on_match: "stop"` prevents further chain processing for a hit.
  # The log entry for /on-match-stop-test will trigger ChainA, then ChainB.
  # Since ChainB has `on_match: "stop"`, processing will halt, and ChainC will NOT be evaluated.
  - name: "OnMatchStop_ChainA_Log"
    action: "log"
    steps:
      - field_matches: { path: "/on-match-stop-test" }
  - name: "OnMatchStop_ChainB_Stop"
    action: "block"
    block_duration: "5m"
    on_match: "stop" # This should stop processing after this chain.
    steps:
      - field_matches: { path: "/on-match-stop-test" }
  - name: "OnMatchStop_ChainC_Should_Not_Run"
    action: "log"
    steps:
      - field_matches: { path: "/on-match-stop-test" }

  # --- 17. Repeated Path Access Detection ---
  - name: "RepeatedPathAccess"
    action: "log"
    steps:
      - field_matches:
          path: "/repeated/path"
        max_delay: "5s"
        repeated: 3

  # --- NEW CHAIN: Rapid API Abuse (429/503) ---
  # Detects an IP that rapidly receives multiple 429 or 503 responses on API paths,
  # indicating aggressive rate-limit bypassing attempts after an initial non-rate-limited hit.
  - name: "Rapid-API-Abuse"
    action: "block"
    block_duration: "5m"
    match_key: "ip_ua"
    steps:
      - field_matches:
          statuscode: [429, 503]
          path: "regex:^/ws/\\d+/"
        max_delay: "1s"
        repeated: 5
  - name: "Test-Challenge-Chain"
    action: "challenge"
    challenge_duration: "5m"
    match_key: "ip"
    steps:
      - field_matches:
          path: "/challenge-test"
